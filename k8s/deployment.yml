apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: opentraum
  labels:
    app: event-service
    app.kubernetes.io/name: event-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: event
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
        app.kubernetes.io/name: event-service
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: event
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: harbor-secret
      priorityClassName: opentraum-medium
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - reservation-service
                        - payment-service
                        - event-service
                topologyKey: kubernetes.io/hostname
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - event-service
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/part-of: opentraum
      containers:
        - name: event-service
          image: amdp-registry.skala-ai.com/skala26a-cloud/opentraum-event-service:583dfa18933469b07301cd5cadfd5254a9e0ff6a
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opentraum-config
          env:
            - name: SPRING_R2DBC_URL
              value: "r2dbc:mysql://event-db.kafka:3306/event"
            - name: SPRING_R2DBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: event-db-secret
                  key: mariadb-user
            - name: SPRING_R2DBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: event-db-secret
                  key: mariadb-password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "my-kafka-cluster-kafka-bootstrap.kafka:9092"
            - name: OTLP_TRACING_ENDPOINT
              value: "http://alloy-otlp.monitoring:4318/v1/traces"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opentraum-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
            - name: SPRING_MAIN_LAZY_INITIALIZATION
              value: "false"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "500m"
      restartPolicy: Always

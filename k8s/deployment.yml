apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: opentraum
  labels:
    app: event-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: event
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: event
    spec:
      terminationGracePeriodSeconds: 10
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: event-service
          image: amdp-registry.skala-ai.com/skala26a-cloud/opentraum-event-service:71c8e531c82c538735d6bd7f0f7fc7aa9a35f9f1
          ports:
            - containerPort: 8083
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opentraum-config
          env:
            - name: DB_HOST
              value: "opentraum-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "opentraum_event"
            - name: DB_USERNAME
              value: "opentraum"
            - name: DB_PASSWORD
              value: "opentraum"
            - name: SPRING_R2DBC_URL
              value: "r2dbc:postgresql://opentraum-postgres:5432/opentraum_event"
            - name: SPRING_R2DBC_USERNAME
              value: "opentraum"
            - name: SPRING_R2DBC_PASSWORD
              value: "opentraum"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opentraum-secrets
                  key: OPENAI_API_KEY
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
            - name: SPRING_MAIN_LAZY_INITIALIZATION
              value: "true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
      restartPolicy: Always

apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: opentraum
  labels:
    app: event-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: event
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: event
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: event-service
          image: amdp-registry.skala-ai.com/skala26a-cloud/opentraum-event-service:e14ae2ffe7d2e91cc2c62ec7a6183caa6edecf12
          ports:
            - containerPort: 8083
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opentraum-config
          env:
            - name: DB_HOST
              value: "opentraum-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "opentraum_event"
            - name: DB_USERNAME
              value: "opentraum"
            - name: DB_PASSWORD
              value: "opentraum"
            - name: SPRING_R2DBC_URL
              value: "r2dbc:postgresql://opentraum-postgres:5432/opentraum_event"
            - name: SPRING_R2DBC_USERNAME
              value: "opentraum"
            - name: SPRING_R2DBC_PASSWORD
              value: "opentraum"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opentraum-secrets
                  key: OPENAI_API_KEY
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always

apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: opentraum
  labels:
    app: event-service
    app.kubernetes.io/part-of: opentraum
    app.kubernetes.io/component: event
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
        app.kubernetes.io/part-of: opentraum
        app.kubernetes.io/component: event
    spec:
      terminationGracePeriodSeconds: 10
      imagePullSecrets:
        - name: harbor-secret
      priorityClassName: opentraum-medium
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - reservation-service
                        - payment-service
                        - event-service
                topologyKey: kubernetes.io/hostname
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - event-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: event-service
          image: amdp-registry.skala-ai.com/skala26a-cloud/opentraum-event-service:583dfa18933469b07301cd5cadfd5254a9e0ff6a
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opentraum-config
          env:
            - name: DB_HOST
              value: "opentraum-mariadb.mariadb"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "opentraum_event"
            - name: DB_USERNAME
              value: "opentraum"
            - name: DB_PASSWORD
              value: "opentraum123!"
            - name: SPRING_R2DBC_URL
              value: "r2dbc:mysql://opentraum-mariadb.mariadb:3306/opentraum_event"
            - name: SPRING_R2DBC_USERNAME
              value: "opentraum"
            - name: SPRING_R2DBC_PASSWORD
              value: "opentraum123!"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opentraum-secrets
                  key: OPENAI_API_KEY
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
            - name: SPRING_MAIN_LAZY_INITIALIZATION
              value: "true"
          resources:
            requests:
              memory: "768Mi"
              cpu: "500m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
      restartPolicy: Always

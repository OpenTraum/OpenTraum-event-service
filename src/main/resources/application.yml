server:
  port: 8083

spring:
  application:
    name: opentraum-event-service

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/opentraum_event
    username: ${DB_USERNAME:opentraum}
    password: ${DB_PASSWORD:opentraum}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ${KAFKA_GROUP_ID:event-service-group}

  sql:
    init:
      mode: always

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.opentraum.event: DEBUG
    org.springframework.r2dbc: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:opentraum_event}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

  sql:
    init:
      mode: never

logging:
  level:
    root: WARN
    com.opentraum.event: INFO
    org.springframework.r2dbc: WARN

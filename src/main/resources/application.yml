server:
  port: 8083
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s
  application:
    name: opentraum-event-service

  r2dbc:
    url: r2dbc:mysql://${DB_HOST:opentraum-mariadb}:${DB_PORT:3306}/${DB_NAME:opentraum_event}
    username: ${DB_USERNAME:opentraum}
    password: ${DB_PASSWORD:opentraum123!}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ${KAFKA_GROUP_ID:event-saga-group}
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: record
      # 컨테이너 stop 신호가 오면 현재 레코드 처리가 끝날 때까지 대기 후 커밋.
      shutdown-timeout: 10s

  sql:
    init:
      mode: always

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}

management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://alloy.monitoring:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name:event-service},%X{traceId:-},%X{spanId:-}]"
  level:
    root: INFO
    com.opentraum.event: DEBUG
    org.springframework.r2dbc: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  r2dbc:
    url: r2dbc:mysql://${DB_HOST:opentraum-mariadb}:${DB_PORT:3306}/${DB_NAME:opentraum_event}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

  sql:
    init:
      mode: never

logging:
  level:
    root: WARN
    com.opentraum.event: INFO
    org.springframework.r2dbc: WARN
